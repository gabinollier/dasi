<!DOCTYPE html>
<html>
    <head>
        <title>Créer mon compte</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <div class="form-header">
                <h1>Créer mon compte</h1>
                <p>Rejoins le réseau d'aide aux devoirs</p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Prenom</label>
                    <input id="input-prenom" placeholder="Lucas"/>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input id="input-nom" placeholder="Martin"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date de Naissance</label>
                    <input type="date" id="input-datedenaissance"/>
                </div>
                <div class="form-group">
                    <label>Niveau Scolaire</label>
                    <select id="select-niveau">
                        <option value="">Choisir...</option>
                        <option value="6">6ème</option>
                        <option value="5">5ème</option>
                        <option value="4">4ème</option>
                        <option value="3">3ème</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Code UAI de l'établissement</label>
                <input id="input-uai" placeholder="0750001A"/>
                <div class="form-hint">Disponible auprès de votre établissement</div>
            </div>

            <div class="form-group">
                <label>Adresse mail</label>
                <input id="input-email" placeholder="lucas.martin@exemple.fr"/>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="input-motdepasse" placeholder="8 caractères minimum"/>
            </div>

            <button id="button-creermoncompte">Créer mon compte</button>

            <div class="form-footer">
                Déjà inscrit ? <a href="./connexion.html">Se connecter</a>
            </div>
        </div>

        <script>
            function initPage() {
                document.getElementById("button-creermoncompte").addEventListener("click", onButtonClicked);
            };
            
            async function onButtonClicked() {
                
                // INSCRIPTION
                
                let url = './ActionServlet?todo=inscrire-eleve'; 
                
                const prenom = document.getElementById("input-prenom").value;
                const nom = document.getElementById("input-nom").value;
                const datedenaissance = document.getElementById("input-datedenaissance").value;
                const niveauscolaire = document.getElementById("select-niveau").value;
                const uai = document.getElementById("input-uai").value;
                const email = document.getElementById("input-email").value;
                const motdepasse = document.getElementById("input-motdepasse").value;
                
               
                const params = {
                    prenom,
                    nom,
                    datedenaissance,
                    niveauscolaire,
                    uai,
                    email,
                    motdepasse
                };
                
                let jsonResponse = await fetch(url, 
                { 
                    method: 'POST',
                    body: new URLSearchParams(params)
                })
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log("Réponse de l'inscription : " + jsonResponse);
                if (jsonResponse && jsonResponse["success"]) {
                    // CONNECTION/AUTHENTIFICATION
                    
                    let url = './ActionServlet?todo=authentifier'; 
                    const params = {
                        identifiant: email,
                        motdepasse
                    };
                    let jsonResponse = await fetch(url, 
                    { 
                        method: 'POST',
                        body: new URLSearchParams(params)
                    })
                    .then(
                        function(httpResponse) {
                            return httpResponse.json();
                        }
                    )
                    .catch(
                        function(error) {
                            console.log(error);
                            return null;
                        }
                    );
                    console.log("Réponse de l'authentification : " + jsonResponse);
                    
                    if (jsonResponse && jsonResponse["type"] === "eleve")
                    {
                        // On a bien connecté l'élève qui vient de s'inscrire
                        document.location.href = "./nouvelle-demande.html";
                    }
                    else 
                    {
                        alert("Il y a eu un problème");
                    }
                }
                else 
                {
                    alert("Il y a eu un problème");
                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
