<!DOCTYPE html>
<html>
    <head>
        <title>Mon historique</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="sidebar-user.js"></script>
    </head>
    <body class="sidebar-body">
        <div class="sidebar-layout">
            <aside class="sidebar intervenant">
                <div class="sidebar-logo">
                    <span class="sidebar-logo-icon"><i data-lucide="book-open"></i></span>
                    <div>
                        <span class="sidebar-logo-text">INSTRUCT'IF</span>
                        <span class="sidebar-logo-subtitle">Espace intervenant</span>
                    </div>
                </div>

                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item">
                        <a href="dashboard-intervenants.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i data-lucide="home"></i></span>
                            Tableau de bord
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="intervenant-historique.html" class="sidebar-menu-link active">
                            <span class="sidebar-menu-icon"><i data-lucide="history"></i></span>
                            Mon historique
                        </a>
                    </li>
                </ul>

                <div class="sidebar-footer">
                    <div class="sidebar-user">
                        <div class="sidebar-user-name">
                            <span class="sidebar-user-icon"><i data-lucide="user"></i></span>
                            <span id="sidebar-user-name">Utilisateur</span>
                        </div>
                        <div class="sidebar-user-grade" id="sidebar-user-grade">Intervenant</div>
                    </div>
                    <a href="#" class="sidebar-logout">
                        <span><i data-lucide="log-out"></i></span>
                        Se déconnecter
                    </a>
                </div>
            </aside>

            <main class="main-content">
                <div class="page-header">
                    <h1>Mon historique</h1>
                    <p id="soutiens-count" style="color: #999; font-size: 14px;">0 soutiens terminés</p>
                </div>

                <div class="section-title">Établissements visités</div>
                
                <div id="map" style="height: 300px; border-radius: 8px; margin-bottom: 30px;"></div>

                <div class="section-title">Mes derniers soutiens</div>

                <table class="history-table">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>ÉLÈVE</th>
                            <th>MATIÈRE</th>
                            <th>DURÉE</th>
                            <th>STATUT</th>
                            <th style="width: 40px;"></th>
                        </tr>
                    </thead>
                    <tbody id="soutiens-table-body">
                    </tbody>
                </table>
            </main>
        </div>

        <script>
            // Function to calculate duration between two times
            function calculateDuration(heureDebut, heureFin) {
                if (!heureDebut || !heureFin) return '';
                
                const [hD, mD, sD] = heureDebut.split(':').map(Number);
                const [hF, mF, sF] = heureFin.split(':').map(Number);
                
                const debutMs = hD * 3600000 + mD * 60000 + sD * 1000;
                const finMs = hF * 3600000 + mF * 60000 + sF * 1000;
                
                const diffMs = finMs - debutMs;
                const minutes = Math.round(diffMs / 60000);
                
                return minutes > 0 ? `${minutes} min` : '';
            }

            // Function to format date
            function formatDate(dateIso) {
                const date = new Date(dateIso);
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                return date.toLocaleDateString('fr-FR', options);
            }

            // Function to get status badge class
            function getStatusClass(statut) {
                const lower = statut.toLowerCase();
                if (lower === 'finished') return 'finished';
                if (lower === 'cancelled') return 'cancelled';
                if (lower === 'started') return 'ongoing';
                return 'finished';
            }

            // Function to format status text
            function formatStatus(statut) {
                const lower = statut.toLowerCase();
                if (lower === 'finished') return 'Terminée';
                if (lower === 'cancelled') return 'Annulée';
                if (lower === 'started') return 'En cours';
                return statut;
            }

            // Fetch and display soutiens
            function chargerHistorique() {
                fetch('ActionServlet?todo=get-soutiens-intervenant', {
                    method: 'GET'
                })
                .then(response => response.json())
                .then(soutiens => {
                    document.getElementById('soutiens-count').textContent = `${soutiens.length} soutiens terminés`;
                    
                    const tbody = document.getElementById('soutiens-table-body');
                    tbody.innerHTML = '';
                    
                    const etablissementsMap = new Map();
                    
                    soutiens.forEach((soutien, index) => {
                        const duree = calculateDuration(soutien.heureDebut, soutien.heureFin);
                        const date = formatDate(soutien.dateDebut);
                        const statusClass = getStatusClass(soutien.statut);
                        const statusText = formatStatus(soutien.statut);
                        
                        const eleveNom = `${soutien.prenomEleve} ${soutien.nomEleve}`;
                        const eleveclasse = soutien.classeEleve;
                        
                        if (soutien.etablissementNom && soutien.etablissementLat !== 0 && soutien.etablissementLng !== 0) {
                            const key = `${soutien.etablissementLat},${soutien.etablissementLng}`;
                            if (!etablissementsMap.has(key)) {
                                etablissementsMap.set(key, {
                                    nom: soutien.etablissementNom,
                                    lat: soutien.etablissementLat,
                                    lng: soutien.etablissementLng,
                                    count: 0
                                });
                            }
                            etablissementsMap.get(key).count++;
                        }
                        
                        const tr = document.createElement('tr');
                        tr.className = 'row-expandable';
                        tr.innerHTML = `
                            <td>${date}</td>
                            <td>
                                <div>${eleveNom}</div>
                                <div style="font-size: 12px; color: #999;">${eleveclasse}ème</div>
                            </td>
                            <td>${soutien.matiere}</td>
                            <td class="duration-column">${duree}</td>
                            <td>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </td>
                            <td style="text-align: center;">
                                <button class="row-toggle-btn" onclick="toggleBilan(event, ${index})">
                                    <i data-lucide="chevron-down" style="width: 18px; height: 18px;"></i>
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                        
                        // Expanded row with bilan
                        if (soutien.bilan) {
                            const expandedTr = document.createElement('tr');
                            expandedTr.className = `expanded-row expanded-row-${index}`;
                            expandedTr.innerHTML = `
                                <td colspan="6">
                                    <div class="expanded-content">
                                        <div class="bilan-label">
                                            <i data-lucide="file-text" style="width: 16px; height: 16px;"></i>
                                            Bilan de séance
                                        </div>
                                        <div class="bilan-text">${soutien.bilan}</div>
                                    </div>
                                </td>
                            `;
                            tbody.appendChild(expandedTr);
                        }
                    });
                    
                    lucide.createIcons();
                    
                    initMap(etablissementsMap);
                })
                .catch(error => console.error('Erreur:', error));
            }

            function toggleBilan(event, index) {
                event.stopPropagation();
                const expandedRow = document.querySelector(`.expanded-row-${index}`);
                if (expandedRow) {
                    const btn = event.currentTarget;
                    expandedRow.classList.toggle('active');
                    btn.classList.toggle('expanded');
                }
            }

            // Initialize map with establishments
            function initMap(etablissementsMap) {
                const mapContainer = document.getElementById('map');
                mapContainer.innerHTML = '';
                
                if (etablissementsMap.size === 0) {
                    mapContainer.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999;">Aucun établissement à afficher</div>';
                    return;
                }
                
                const etablissements = Array.from(etablissementsMap.values());
                
                const map = L.map('map').setView([etablissements[0].lat, etablissements[0].lng], 10);
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(map);
                
                etablissements.forEach(etab => {
                    const marker = L.marker([etab.lat, etab.lng]).addTo(map);
                    marker.bindPopup(`<b>${etab.nom}</b><br>${etab.count} soutiens effectués`);
                });
                
                const group = L.featureGroup(L.map(etablissements, etab => L.marker([etab.lat, etab.lng])));
                if (group.getLayers().length > 1) {
                    map.fitBounds(group.getBounds().pad(0.1));
                }
            }

            // Initialize
            document.addEventListener('DOMContentLoaded', () => {
                chargerHistorique();
                lucide.createIcons();
            });
        </script>
    </body>
</html>
</body>
</html>
