<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes demandes - INSTRUCT'IF</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #f5f5f5; padding: 0; display: block; min-height: 100vh;">
    <div class="sidebar-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                    <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #5b5dff, #7b7dff); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px;">
                        IF
                    </div>
                    <div>
                        <div style="font-weight: 600; color: #333;">INSTRUCT'IF</div>
                        <div style="font-size: 12px; color: #999;">Espace élève</div>
                    </div>
                </div>
            </div>

            <nav class="sidebar-menu">
                <a href="nouvelle-demande.html" class="sidebar-menu-link" style="display: flex; align-items: center; gap: 12px;">
                    <i data-lucide="plus" style="width: 18px; height: 18px;"></i>
                    <span>Nouvelle demande</span>
                </a>
                <a href="mes-demandes.html" class="sidebar-menu-link active">
                    <span>Mes demandes</span>
                </a>
            </nav>

            <div style="position: absolute; bottom: 20px; left: 20px; right: 20px; border-top: 1px solid #e0e0e0; padding-top: 20px;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <div style="width: 40px; height: 40px; background: #5b5dff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">
                        A
                    </div>
                    <div style="flex: 1;">
                        <div id="user-name" style="font-weight: 500; font-size: 14px; color: #333;"></div>
                        <div id="user-classe" style="font-size: 12px; color: #999;"></div>
                    </div>
                </div>
                <a href="#" style="display: flex; align-items: center; gap: 8px; color: #5b5dff; text-decoration: none; font-size: 13px;">
                    <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
                    Se déconnecter
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" style="background: white; margin-left: 255px; padding: 40px;">
            <div class="page-header">
                <h1>Mes demandes</h1>
                <p style="color: #999; font-size: 14px;">Retrouve tes séances passées et les bilans de tes intervenants.</p>
            </div>

            <table class="history-table">
                <thead>
                    <tr>
                        <th>DATE</th>
                        <th>MATIÈRE</th>
                        <th>THÈME</th>
                        <th>INTERVENANT</th>
                        <th>STATUT</th>
                        <th style="width: 40px;"></th>
                    </tr>
                </thead>
                <tbody id="demandes-table-body">
                </tbody>
            </table>
        </main>
    </div>

    <script>
        // Function to format date
        function formatDate(dateIso) {
            const date = new Date(dateIso);
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            return date.toLocaleDateString('fr-FR', options);
        }

        // Function to get status badge class
        function getStatusClass(statut) {
            const lower = statut.toLowerCase();
            if (lower === 'finished') return 'finished';
            if (lower === 'cancelled') return 'cancelled';
            if (lower === 'started') return 'ongoing';
            return 'finished';
        }

        // Function to format status text
        function formatStatus(statut) {
            const lower = statut.toLowerCase();
            if (lower === 'finished') return 'Terminée';
            if (lower === 'cancelled') return 'Annulée';
            if (lower === 'started') return 'En cours';
            return statut;
        }

        // Fetch and display demandes
        function chargerDemandes() {
            fetch('ActionServlet?todo=get-soutiens-eleve', {
                method: 'GET'
            })
            .then(response => response.json())
            .then(soutiens => {
                const tbody = document.getElementById('demandes-table-body');
                tbody.innerHTML = '';
                
                soutiens.forEach((soutien, index) => {
                    const date = formatDate(soutien.dateDebut);
                    const statusClass = getStatusClass(soutien.statut);
                    const statusText = formatStatus(soutien.statut);
                    
                    const intervenantNom = `${soutien.prenomIntervenant} ${soutien.nomIntervenant}`;
                    
                    // Main row
                    const tr = document.createElement('tr');
                    tr.className = 'row-expandable';
                    tr.innerHTML = `
                        <td>${date}</td>
                        <td style="font-weight: 500;">${soutien.matiere}</td>
                        <td class="theme-column">${soutien.theme}</td>
                        <td>${intervenantNom}</td>
                        <td>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </td>
                        <td style="text-align: center;">
                            <button class="row-toggle-btn" onclick="toggleBilan(event, ${index})" ${soutien.bilan ? '' : 'disabled'} style="${soutien.bilan ? '' : 'opacity: 0.3; cursor: not-allowed;'}">
                                <i data-lucide="chevron-down" style="width: 18px; height: 18px;"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                    
                    // Expanded row with bilan
                    if (soutien.bilan) {
                        const expandedTr = document.createElement('tr');
                        expandedTr.className = `expanded-row expanded-row-${index}`;
                        expandedTr.innerHTML = `
                            <td colspan="6">
                                <div class="expanded-content">
                                    <div class="bilan-label">
                                        <i data-lucide="file-text" style="width: 16px; height: 16px;"></i>
                                        Bilan de séance
                                    </div>
                                    <div class="bilan-text">${soutien.bilan}</div>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(expandedTr);
                    }
                });
                
                lucide.createIcons();
            })
            .catch(error => console.error('Erreur:', error));
        }

        // Toggle bilan visibility
        function toggleBilan(event, index) {
            event.stopPropagation();
            const expandedRow = document.querySelector(`.expanded-row-${index}`);
            if (expandedRow) {
                const btn = event.currentTarget;
                expandedRow.classList.toggle('active');
                btn.classList.toggle('expanded');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            chargerDemandes();
        });
    </script>
</body>
</html>
